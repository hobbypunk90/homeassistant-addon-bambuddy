name: "Obico ML API (Bambuddy)"
version: "1.4-0.1"
slug: bambuddy_obico_ml
description: "A headless Obico ML API sidecar container for local AI print-failure detection in Bambuddy."
url: "https://github.com/connormxy/homeassistant-addon-bambuddy"
arch:
  - aarch64
  - amd64
startup: services
boot: auto
init: false
ports:
  3333/tcp: 3333
ports_description:
  3333/tcp: Obico ML API Port (use this in Bambuddy settings)
healthcheck:
  enabled: true
  interval: 30s
  timeout: 10s
  retries: 3